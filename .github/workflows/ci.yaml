# .github/workflows/ci.yaml

name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'CHANGELOG.md'
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and vet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet (windows target)
        run: GOOS=windows GOARCH=amd64 go vet ./...

      - name: Build test binary
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -o dist/dns-monitor.exe .
          ls -lh dist/dns-monitor.exe