# .github/workflows/release.yaml

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build binary
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o dist/dns-monitor.exe \
            .
          ls -lh dist/dns-monitor.exe

      - name: Package release
        run: |
          cd dist
          zip dns-monitor-${VERSION}-windows-amd64.zip dns-monitor.exe

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/dns-monitor.exe
            dist/dns-monitor-${{ env.VERSION }}-windows-amd64.zip